<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>PuttTracker Web UI</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>
    body { margin: 0; background: #111; color: #eee; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    header { padding: 8px 12px; background:#181818; display:flex; align-items:center; gap:12px; }
    .dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
    #status.green{ background:#16a34a; } #status.yellow{ background:#f59e0b; } #status.red{ background:#ef4444; }
    #wrap { position:relative; width:100%; max-width: 1100px; margin: 8px auto; }
    #video { width:100%; display:block; }
    #overlay { position:absolute; inset:0; pointer-events:none; }
    #metrics { padding:8px 12px; font-size: 14px; color:#cbd5e1; }
    code { color:#93c5fd; }
  </style>
</head>
<body>
<header>
  <strong>PuttTracker</strong>
  <span id="state">IDLE</span>
  <span class="dot" id="status"></span>
</header>
<div id="wrap">
  <img id="video" src="/video.mjpg" alt="video"/>
  <canvas id="overlay"></canvas>
</div>
<div id="metrics">
  <div>mph: <code id="mph">0.0</code> | yds/s: <code id="yps">0.00</code> | HLA: <code id="hla">0.0°</code> | FPS: <code id="fps">0</code></div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
